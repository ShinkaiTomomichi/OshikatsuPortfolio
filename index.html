<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し活ログ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== Header ========== -->
  <header class="site-header">
    <div class="site-header__inner">
      <h1 class="site-header__title">推し活ログ</h1>
      <p class="site-header__subtitle">推し活の活動記録を本ページにまとめています</p>
    </div>
  </header>

  <!-- ========== Navigation ========== -->
  <nav class="site-nav">
    <div class="site-nav__inner">
      <a href="#" class="site-nav__link is-active" data-tab="past">活動一覧</a>
      <a href="#" class="site-nav__link" data-tab="upcoming">今後の活動予定</a>
    </div>
  </nav>

  <!-- ========== Main ========== -->
  <main>
    <div class="container">

      <!-- ===== 活動一覧タブ ===== -->
      <div id="tab-past" class="tab-panel">

        <!-- 集計カード -->
        <section class="status-row" aria-label="活動集計">
          <div class="stat-card">
            <span class="stat-card__label">総活動数</span>
            <span class="stat-card__value" id="past-stat-total">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">ライブ参加</span>
            <span class="stat-card__value" id="past-stat-live">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">イベント参加</span>
            <span class="stat-card__value" id="past-stat-event">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">ショップ</span>
            <span class="stat-card__value" id="past-stat-shop">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">フード</span>
            <span class="stat-card__value" id="past-stat-food">-</span>
          </div>
        </section>

        <!-- フィルターセクション -->
        <section class="filter-section" aria-label="フィルター">
          <div class="filter-bar" id="past-category-filter-bar">
            <span class="filter-bar__label">カテゴリ:</span>
          </div>
          <div class="filter-bar" id="past-year-filter-bar">
            <span class="filter-bar__label">年:</span>
          </div>
          <div class="filter-bar" id="past-tag-filter-bar">
            <span class="filter-bar__label">タグ:</span>
          </div>
        </section>

        <!-- タイムライン -->
        <div id="past-timeline"></div>
        <p id="past-empty-state" hidden>該当するログがありません。</p>

      </div>

      <!-- ===== 今後の活動予定タブ ===== -->
      <div id="tab-upcoming" class="tab-panel" hidden>

        <!-- 集計カード -->
        <section class="status-row" aria-label="活動集計">
          <div class="stat-card">
            <span class="stat-card__label">総活動数</span>
            <span class="stat-card__value" id="upcoming-stat-total">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">ライブ参加</span>
            <span class="stat-card__value" id="upcoming-stat-live">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">イベント参加</span>
            <span class="stat-card__value" id="upcoming-stat-event">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">ショップ</span>
            <span class="stat-card__value" id="upcoming-stat-shop">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">フード</span>
            <span class="stat-card__value" id="upcoming-stat-food">-</span>
          </div>
        </section>

        <!-- フィルターセクション -->
        <section class="filter-section" aria-label="フィルター">
          <div class="filter-bar" id="upcoming-category-filter-bar">
            <span class="filter-bar__label">カテゴリ:</span>
          </div>
          <div class="filter-bar" id="upcoming-year-filter-bar">
            <span class="filter-bar__label">年:</span>
          </div>
          <div class="filter-bar" id="upcoming-tag-filter-bar">
            <span class="filter-bar__label">タグ:</span>
          </div>
        </section>

        <!-- タイムライン -->
        <div id="upcoming-timeline"></div>
        <p id="upcoming-empty-state" hidden>該当するログがありません。</p>

      </div>

    </div>
  </main>

  <!-- ========== Footer ========== -->
  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__text">2026 推し活ログ</p>
    </div>
  </footer>

  <script src="js/main.js?v=4"></script>
</body>
</html>
